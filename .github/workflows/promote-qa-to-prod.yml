name: Promote QA Artifact to PROD

on:
  workflow_dispatch:
    inputs:
      qa_run_id:
        description: "Run ID of successful QA deployment from Deploy Environments workflow"
        required: true
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: promote-prod-${{ inputs.qa_run_id }}
  cancel-in-progress: false

jobs:
  verify-qa-run:
    name: Verify QA Run
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.inspect.outputs.artifact_name }}
      deploy_sha: ${{ steps.inspect.outputs.deploy_sha }}
    steps:
      - name: Validate QA run and fetch artifact metadata
        id: inspect
        uses: actions/github-script@v7
        with:
          script: |
            const runId = Number(core.getInput('qa_run_id', { required: true }))
            if (!Number.isFinite(runId) || runId <= 0) {
              core.setFailed('qa_run_id must be a positive integer run id')
              return
            }

            const { owner, repo } = context.repo
            const run = await github.rest.actions.getWorkflowRun({ owner, repo, run_id: runId })
            const wf = run.data

            if (wf.name !== 'Deploy Environments') {
              core.setFailed(`Run ${runId} is for workflow "${wf.name}", expected "Deploy Environments"`)
              return
            }
            if (wf.conclusion !== 'success') {
              core.setFailed(`Run ${runId} is not successful (conclusion=${wf.conclusion})`)
              return
            }

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner,
              repo,
              run_id: runId,
              per_page: 100
            })

            const qaJob = jobs.find((j) => j.name === 'Deploy QA')
            if (!qaJob || qaJob.conclusion !== 'success') {
              core.setFailed('QA deployment job is missing or not successful for the provided run id')
              return
            }

            const artifacts = await github.paginate(github.rest.actions.listWorkflowRunArtifacts, {
              owner,
              repo,
              run_id: runId,
              per_page: 100
            })

            const bundle = artifacts.find((a) => a.name && a.name.startsWith('cardpilot-bundle-') && !a.expired)
            if (!bundle) {
              core.setFailed('No valid deployment bundle artifact found for the QA run')
              return
            }

            const deploySha = String(bundle.name).replace('cardpilot-bundle-', '').trim()
            core.setOutput('artifact_name', bundle.name)
            core.setOutput('deploy_sha', deploySha)

  deploy-prod:
    name: Promote to PROD
    runs-on: ubuntu-latest
    needs: verify-qa-run
    environment:
      name: PROD
    steps:
      - name: Download QA deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.verify-qa-run.outputs.artifact_name }}
          run-id: ${{ inputs.qa_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: .deployment-bundle

      - name: Show promoted artifact metadata
        shell: bash
        run: |
          echo "Promoting artifact: ${{ needs.verify-qa-run.outputs.artifact_name }}"
          echo "Commit SHA: ${{ needs.verify-qa-run.outputs.deploy_sha }}"
          cat .deployment-bundle/metadata.json

      - name: Trigger PROD deployment webhook
        if: ${{ secrets.PROD_DEPLOY_WEBHOOK_URL != '' }}
        shell: bash
        run: |
          curl -sS -X POST "${{ secrets.PROD_DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ needs.verify-qa-run.outputs.deploy_sha }}","environment":"prod","artifact":"${{ needs.verify-qa-run.outputs.artifact_name }}","sourceQaRunId":"${{ inputs.qa_run_id }}"}'

      - name: PROD promotion summary
        shell: bash
        run: |
          echo "Promoted QA run id: ${{ inputs.qa_run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: ${{ needs.verify-qa-run.outputs.artifact_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit SHA: ${{ needs.verify-qa-run.outputs.deploy_sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Configure PROD_DEPLOY_WEBHOOK_URL secret for real deployment trigger." >> "$GITHUB_STEP_SUMMARY"
