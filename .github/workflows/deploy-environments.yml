name: Deploy Environments

on:
  push:
    branches:
      - poc
      - dev
      - qa
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - qa
      ref:
        description: "Branch or SHA to deploy"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve-target:
    name: Resolve Deployment Target
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.resolve.outputs.target }}
      deploy_ref: ${{ steps.resolve.outputs.deploy_ref }}
    steps:
      - name: Resolve target and ref
        id: resolve
        shell: bash
        run: |
          target=""
          deploy_ref="${{ github.sha }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            target="${{ inputs.target_environment }}"
            if [[ -n "${{ inputs.ref }}" ]]; then
              deploy_ref="${{ inputs.ref }}"
            fi
          else
            case "${{ github.ref_name }}" in
              poc|dev)
                target="dev"
                ;;
              qa)
                target="qa"
                ;;
              *)
                echo "Unsupported branch for deployment: ${{ github.ref_name }}"
                exit 1
                ;;
            esac
          fi

          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=$deploy_ref" >> "$GITHUB_OUTPUT"

  build-artifacts:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: resolve-target
    outputs:
      artifact_name: ${{ steps.bundle-meta.outputs.artifact_name }}
      deploy_sha: ${{ steps.bundle-meta.outputs.deploy_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.deploy_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Verify backend boots
        run: node --check backend/server.js

      - name: Create bundle metadata
        id: bundle-meta
        shell: bash
        run: |
          mkdir -p .deployment-bundle
          deploy_sha="$(git rev-parse HEAD)"
          artifact_name="cardpilot-bundle-${deploy_sha}"
          cat > .deployment-bundle/metadata.json <<EOF
          {
            "sha": "${deploy_sha}",
            "ref": "${{ needs.resolve-target.outputs.deploy_ref }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=${deploy_sha}" >> "$GITHUB_OUTPUT"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle-meta.outputs.artifact_name }}
          path: .deployment-bundle/metadata.json
          if-no-files-found: error
          retention-days: 14

  deploy-dev:
    name: Deploy DEV (POC)
    runs-on: ubuntu-latest
    needs:
      - resolve-target
      - build-artifacts
    if: needs.resolve-target.outputs.target == 'dev'
    environment:
      name: DEV-POC
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.deploy_ref }}

      - name: Trigger DEV deployment webhook
        if: ${{ secrets.DEV_DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -sS -X POST "${{ secrets.DEV_DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ needs.build-artifacts.outputs.deploy_sha }}","environment":"dev"}'

      - name: DEV deployment summary
        run: |
          echo "DEV deployment completed for ref: ${{ needs.resolve-target.outputs.deploy_ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: ${{ needs.build-artifacts.outputs.artifact_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Configure DEV_DEPLOY_WEBHOOK_URL secret to trigger real infrastructure deployment." >> "$GITHUB_STEP_SUMMARY"

  deploy-qa:
    name: Deploy QA
    runs-on: ubuntu-latest
    needs:
      - resolve-target
      - build-artifacts
    if: needs.resolve-target.outputs.target == 'qa'
    environment:
      name: QA
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.deploy_ref }}

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-artifacts.outputs.artifact_name }}
          path: .deployment-bundle

      - name: Trigger QA deployment webhook
        if: ${{ secrets.QA_DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -sS -X POST "${{ secrets.QA_DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ needs.build-artifacts.outputs.deploy_sha }}","environment":"qa","artifact":"${{ needs.build-artifacts.outputs.artifact_name }}"}'

      - name: QA deployment summary
        run: |
          echo "QA deployment completed for ref: ${{ needs.resolve-target.outputs.deploy_ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact: ${{ needs.build-artifacts.outputs.artifact_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Configure QA_DEPLOY_WEBHOOK_URL secret to trigger real infrastructure deployment." >> "$GITHUB_STEP_SUMMARY"

