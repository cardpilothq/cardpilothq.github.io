name: Deploy Environments

on:
  push:
    branches:
      - poc
      - dev
      - qa
      - main
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - qa
          - prod
      ref:
        description: "Branch or SHA to deploy"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve-target:
    name: Resolve Deployment Target
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.resolve.outputs.target }}
      deploy_ref: ${{ steps.resolve.outputs.deploy_ref }}
    steps:
      - name: Resolve target and ref
        id: resolve
        shell: bash
        run: |
          target=""
          deploy_ref="${{ github.sha }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            target="${{ inputs.target_environment }}"
            if [[ -n "${{ inputs.ref }}" ]]; then
              deploy_ref="${{ inputs.ref }}"
            fi
          else
            case "${{ github.ref_name }}" in
              poc|dev)
                target="dev"
                ;;
              qa)
                target="qa"
                ;;
              main)
                target="prod"
                ;;
              *)
                echo "Unsupported branch for deployment: ${{ github.ref_name }}"
                exit 1
                ;;
            esac
          fi

          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=$deploy_ref" >> "$GITHUB_OUTPUT"

  build-artifacts:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: resolve-target
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.deploy_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Verify backend boots
        run: node --check backend/server.js

  deploy-dev:
    name: Deploy DEV (POC)
    runs-on: ubuntu-latest
    needs:
      - resolve-target
      - build-artifacts
    if: needs.resolve-target.outputs.target == 'dev'
    environment:
      name: DEV-POC
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.deploy_ref }}

      - name: Trigger DEV deployment webhook
        if: ${{ secrets.DEV_DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -sS -X POST "${{ secrets.DEV_DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ github.sha }}","environment":"dev"}'

      - name: DEV deployment summary
        run: |
          echo "DEV deployment completed for ref: ${{ needs.resolve-target.outputs.deploy_ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Configure DEV_DEPLOY_WEBHOOK_URL secret to trigger real infrastructure deployment." >> "$GITHUB_STEP_SUMMARY"

  deploy-qa:
    name: Deploy QA
    runs-on: ubuntu-latest
    needs:
      - resolve-target
      - build-artifacts
    if: needs.resolve-target.outputs.target == 'qa' || needs.resolve-target.outputs.target == 'prod'
    environment:
      name: QA
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.deploy_ref }}

      - name: Trigger QA deployment webhook
        if: ${{ secrets.QA_DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -sS -X POST "${{ secrets.QA_DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ github.sha }}","environment":"qa"}'

      - name: QA deployment summary
        run: |
          echo "QA deployment completed for ref: ${{ needs.resolve-target.outputs.deploy_ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Configure QA_DEPLOY_WEBHOOK_URL secret to trigger real infrastructure deployment." >> "$GITHUB_STEP_SUMMARY"

  deploy-prod:
    name: Deploy PROD
    runs-on: ubuntu-latest
    needs:
      - resolve-target
      - build-artifacts
      - deploy-qa
    if: needs.resolve-target.outputs.target == 'prod'
    environment:
      name: PROD
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-target.outputs.deploy_ref }}

      - name: Trigger PROD deployment webhook
        if: ${{ secrets.PROD_DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -sS -X POST "${{ secrets.PROD_DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ github.sha }}","environment":"prod"}'

      - name: PROD deployment summary
        run: |
          echo "PROD deployment completed for ref: ${{ needs.resolve-target.outputs.deploy_ref }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Set required reviewers on the PROD environment for QA to PROD approval gating." >> "$GITHUB_STEP_SUMMARY"
